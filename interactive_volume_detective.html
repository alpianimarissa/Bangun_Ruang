<!DOCTYPE html>

    <!-- Google Fonts -->

        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],

            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>

<body class="bg-gradient-to-br from-[#FFFDF0] via-[#F3FBF7] to-[#EEF2FF] min-h-screen flex flex-col justify-between overflow-x-hidden select-none">

    <!-- TOP HEADER -->
    <header class="bg-white/95 backdrop-blur-md border-b-4 border-[#10B981] py-3.5 px-6 flex justify-between items-center sticky top-0 z-40 shadow-sm">

        <div class="flex items-center gap-3">

            <!-- Scratchpad Toggle -->

                ✏️ <span>Papan Cakar</span>

        </div>
    </header>

    <!-- SCRATCHPAD DRAWING OVERLAY -->
    <div id="scratchpad" class="hidden fixed inset-0 z-50 bg-white/95 flex flex-col p-4">
        <div class="flex justify-between items-center mb-2 border-b-2 border-gray-100 pb-2">
            <h3 class="heading-font text-lg font-bold text-[#00838F] flex items-center gap-2">
                ✏️ Papan Cakar Aljabar & Sketsa Geometri

            <div class="flex items-center gap-2">
                <button onclick="clearCanvas()" class="bg-red-50 hover:bg-red-100 text-red-600 font-bold px-3 py-1.5 rounded-xl text-xs">Bersihkan</button>
                <button onclick="toggleScratchpad()" class="bg-[#00838F] hover:bg-[#006064] text-white font-bold px-4 py-1.5 rounded-xl text-xs">Kembali ke Slide</button>
            </div>
        </div>
        <div class="flex-1 bg-amber-50/20 border-4 border-dashed border-[#00ACC1] rounded-2xl relative cursor-crosshair overflow-hidden">

        </div>

    <!-- MAIN SLIDE CONTAINER -->
    <main class="flex-1 flex items-center justify-center p-4 relative my-4">
        <!-- Prev Arrow -->
        <button id="prev-btn" onclick="changeSlide(-1)" class="absolute left-2 md:left-6 z-30 bg-white hover:bg-[#FFF4E0] text-[#FF8C00] border-4 border-[#FFE082] w-12 h-12 rounded-full flex items-center justify-center text-lg shadow-md active:scale-90 transition">
            ◀
        </button>

        <!-- Slide Body wrapper -->
        <div id="slide-wrapper" class="w-full max-w-4xl bg-white rounded-3xl border-8 border-[#FFE082] shadow-xl overflow-hidden flex flex-col justify-between min-h-[520px] md:min-h-[580px] slide-transition">
            <!-- Top Progress Bar -->
            <div class="w-full bg-[#FFF9E6] h-3">
                <div id="progress-bar" class="bg-[#FF8C00] h-full transition-all duration-300" style="width: 4%"></div>
            </div>

            <!-- Dynamic Content Area -->
            <div id="slide-content" class="p-6 md:p-10 flex-1 flex flex-col justify-center overflow-y-auto max-h-[460px] md:max-h-[510px]">
                <!-- Loaded dynamically by Javascript -->
            </div>

            <!-- Footer Status Badge -->
            <div class="bg-[#FFFDF5] border-t-2 border-[#FFF2CC] px-6 py-3 flex justify-between items-center text-xs md:text-sm font-bold text-[#FF8C00]">

                <span id="slide-index" class="bg-[#FF8C00] text-white px-3 py-1 rounded-full">Slide 1 / 25</span>

        </div>

        <!-- Next Arrow -->
        <button id="next-btn" onclick="changeSlide(1)" class="absolute right-2 md:right-6 z-30 bg-white hover:bg-[#FFF4E0] text-[#FF8C00] border-4 border-[#FFE082] w-12 h-12 rounded-full flex items-center justify-center text-lg shadow-md active:scale-90 transition">
            ▶

    <!-- FLOATING TOAST NOTIFICATION -->

    </div>

    <!-- CONFETTI CELEBRATION CANVAS -->
    <canvas id="confetti" class="fixed inset-0 pointer-none z-50 w-full h-full hidden"></canvas>

    <!-- INLINE JAVASCRIPT & DATABASE SLIDES -->
    <script>
        // --- 1. WEB AUDIO API SYNTHESIZER ---
        let audioCtx;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function playSound(type) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08); 
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16); 
                    osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.24); 
                    gain.gain.setValueAtTime(0.12, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.45);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.45);
                } else if (type === 'incorrect') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(140, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + 0.35);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.35);
                } else if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(380, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(280, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.04, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.08);
                }
            } catch (e) {
                console.log("Audio synthesized successfully.");
            }
        }

        // --- 2. THE 25 SLIDES DATABASE ---
        const slides = [
            // Slide 1: Welcome / Title
            {
                section: "Misi Pembuka",
                title: "Asal-usul Sisi Lengkung Lancip & Bola",

                render: () => `
                    <div class="text-center">

                            </svg>
                            <!-- Gorgeous 3D-styled Sphere SVG -->
                            <svg class="w-28 h-28 text-[#10B981] animate-pulse" viewBox="0 0 100 100" fill="none">
                                <circle cx="50" cy="50" r="35" fill="#D1FAE5" stroke="#059669" stroke-width="3"/>
                                <ellipse cx="50" cy="50" rx="35" ry="10" fill="none" stroke="#059669" stroke-width="1.5" stroke-dasharray="3 3"/>
                                <ellipse cx="50" cy="50" rx="10" ry="35" fill="none" stroke="#059669" stroke-width="1" stroke-dasharray="3 3"/>
                            </svg>
                        </div>
                        <h2 class="heading-font text-3xl md:text-5xl font-extrabold text-[#1E3A8A] mb-2">Detektif Volume</h2>

                        <div class="inline-block bg-[#F5F3FF] border-2 border-dashed border-[#A78BFA] rounded-2xl p-4 max-w-lg mx-auto">
                            <p class="text-xs md:text-sm text-violet-900 font-semibold">"Halo Detektif Muda! Hari ini kita akan menggunakan simulasi visual 3D untuk mengupas dari mana datangnya rumus matematika Kerucut dan Bola!"</p>
                        </div>
                    </div>
                `

            // Slide 2: Target Belajar (Tujuan)
            {
                section: "Misi Pembuka",
                title: "Tujuan & Target Pembelajaran",
                subtitle: "Capaian Pembelajaran Matematika",
                icon: "🎯",
                render: () => `
                    <div class="max-w-2xl mx-auto text-left">
                        <p class="text-sm text-gray-500 font-bold mb-4">Selesaikan misi ini untuk menguasai kompetensi tingkat tinggi:</p>
                        <ul class="space-y-3 text-xs md:text-sm">
                            <li class="bg-violet-50 border-l-8 border-[#8B5CF6] p-3 rounded-r-xl font-bold text-violet-950 flex items-center gap-3">
                                <span class="text-lg">📐</span> Menemukan hubungan volume antara Limas Lingkaran (Kerucut) dengan Tabung.
                            </li>
                            <li class="bg-[#EFF6FF] border-l-8 border-[#3B82F6] p-3 rounded-r-xl font-bold text-blue-950 flex items-center gap-3">
                                <span class="text-lg">🔮</span> Menjelaskan asal-usul rumus volume Bola melalui eksperimen penuangan air kerucut.
                            </li>
                            <li class="bg-[#F0FDF4] border-l-8 border-[#10B981] p-3 rounded-r-xl font-bold text-emerald-950 flex items-center gap-3">
                                <span class="text-lg">🔥</span> Memecahkan soal perhitungan balik mencari jari-jari/tinggi, serta soal cerita kehidupan sehari-hari (HOTS).
                            </li>
                        </ul>
                    </div>
                `
            },
            // Slide 3: Peta Perjalanan
            {
                section: "Misi Pembuka",
                title: "Peta Petualangan Belajar",
                subtitle: "Alur Misi Pencarian Asal-usul Rumus",
                icon: "🗺️",
                render: () => `
                    <div class="w-full">
                        <p class="text-sm text-center text-gray-500 font-bold mb-6">4 Stasiun penting yang harus kamu tuntaskan:</p>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="bg-[#FFF9DB] p-4 rounded-2xl border-2 border-[#F59E0B] text-center">
                                <span class="text-3xl">🧩</span>
                                <h4 class="font-bold text-[#78350F] text-xs mt-2">1. Warm-Up & Review</h4>
                            </div>
                            <div class="bg-[#EBF8FF] p-4 rounded-2xl border-2 border-[#3182CE] text-center">
                                <span class="text-3xl">📐</span>
                                <h4 class="font-bold text-[#2B6CB0] text-xs mt-2">2. Asal-Usul Kerucut</h4>
                            </div>
                            <div class="bg-[#E6FFFA] p-4 rounded-2xl border-2 border-[#319795] text-center">
                                <span class="text-3xl">🔮</span>
                                <h4 class="font-bold text-[#2C7A7B] text-xs mt-2">3. Penyelidikan Bola</h4>
                            </div>
                            <div class="bg-[#FFF5F5] p-4 rounded-2xl border-2 border-[#E53E3E] text-center">

                                <h4 class="font-bold text-[#9B2C2C] text-xs mt-2">4. 8 Tantangan Kuis</h4>
                            </div>
                        </div>
                    </div>
                `
            },
            // Slide 4: Warm-Up 1
            {
                section: "Warm-Up",
                title: "Review: Dasar Tabung & Luas Lingkaran",
                subtitle: "Fondasi penting sebelum masuk ke rumus lancip",
                icon: "🧩",
                render: () => `
                    <div class="text-center">
                        <p class="text-sm font-bold text-gray-600 mb-4">Jika sebuah tabung memiliki <strong>luas alas $14 \\text{ cm}^2$</strong> dan <strong>tinggi $10 \\text{ cm}$</strong>. Berapakah volume tabung tersebut?</p>
                        <div class="flex justify-center items-center gap-3 text-2xl md:text-3xl font-black mb-6">
                            <span class="bg-amber-100 px-4 py-2 rounded-xl text-amber-700">$14 \\text{ cm}^2$</span>
                            <span>×</span>
                            <span class="bg-amber-100 px-4 py-2 rounded-xl text-amber-700">$10 \\text{ cm}$</span>
                            <span>=</span>
                            <span class="bg-emerald-100 text-emerald-700 px-6 py-2 rounded-xl">?</span>
                        </div>
                        <div class="grid grid-cols-3 gap-3 max-w-md mx-auto">
                            <button onclick="checkSlideAnswer(this, false, 'Salah. Ingat Rumus Volume Tabung = Luas Alas x Tinggi.', 5)" class="bg-[#F3F4F6] hover:bg-gray-100 p-3 rounded-xl border font-bold text-sm">24 cm³</button>
                            <button onclick="checkSlideAnswer(this, true, 'Sangat Hebat! Volume Tabung = Luas Alas x Tinggi = 14 x 10 = 140 cm³.', 5)" class="bg-[#F3F4F6] hover:bg-gray-100 p-3 rounded-xl border font-bold text-sm">140 cm³</button>
                            <button onclick="checkSlideAnswer(this, false, 'Masih salah.', 5)" class="bg-[#F3F4F6] hover:bg-gray-100 p-3 rounded-xl border font-bold text-sm">144 cm³</button>
                        </div>
                    </div>

            // Slide 5: Warm-Up 2
            {
                section: "Warm-Up",
                title: "Teka-teki Luas Selimut Tabung",
                subtitle: "Mengingat jaring-jaring selimut tabung",
                icon: "🧱",
                render: () => `
                    <div class="grid md:grid-cols-2 gap-6 items-center">
                        <div class="flex justify-center bg-violet-50 p-4 rounded-2xl border-2 border-violet-200">

                            <svg class="w-44 h-36" viewBox="0 0 100 80">
                                <rect x="35" y="15" width="30" height="40" fill="#93C5FD" stroke="#2563EB" stroke-width="2" rx="3"/>

                render: () => `

                                Desain Kerucut dalam Game & Sains

            // Slide 7: Real-world Connection 2

                title: "Bola Sepak & Gelembung Air",
                subtitle: "Sifat sempurna dari bangun ruang tanpa sudut",

                render: () => `

                                <line x1="50" y1="25" x2="50" y2="10" stroke="#334155" stroke-width="2"/>

            // Slide 8: Konsep 1 (Asal Usul Rumus Limas dari Pembelahan Kubus)

                icon: "💎",
                render: () => `
                    <div class="grid md:grid-cols-2 gap-4 items-center">
                        <div class="flex justify-center bg-violet-50 p-4 rounded-2xl border-2 border-violet-200">
                            <!-- SVG 3D Isometric transparent Cube showing 6 Pyramids meeting at center -->
                            <svg class="w-44 h-44" viewBox="0 0 100 100">
                                <!-- Base Grid lines for depth -->
                                <polygon points="20,80 50,95 80,80 50,65" fill="#DDD6FE" fill-opacity="0.4" stroke="#7C3AED" stroke-width="1"/>

                                <polygon points="20,40 50,55 80,40 50,25" fill="none" stroke="#7C3AED" stroke-width="1" stroke-dasharray="2 2"/>

                explanation: "Volume = 1/3 * pi * r² * t -> 462 = 1/3 * 22/7 * 7 * 7 * t -> 462 = 154/3 * t -> t = (462 * 3)/154 = 9 cm."
            },
            // Slide 22: Soal 4
            {
                section: "Latihan Soal",
                title: "Misi 4: Luas Permukaan Setengah Bola",
                subtitle: "Perhatikan bagian potongan dasar bola (Medium)",
                icon: "🏆",
                render: () => `
                    <div class="text-center">
                        <p class="text-sm font-bold text-gray-600 mb-4">Sebuah semangka padat dipotong menjadi setengah bagian dengan jari-jari <strong>$7 \\text{ cm}$</strong>. Berapakah luas permukaan total semangka tersebut? (Gunakan $\\pi = \\frac{22}{7}$)</p>
                        <div class="grid grid-cols-2 gap-3 max-w-md mx-auto" id="options-s22"></div>
                    </div>
                `,
                isQuiz: true,
                options: ["$462 \\text{ cm}^2$", "$308 \\text{ cm}^2$", "$154 \\text{ cm}^2$", "$616 \\text{ cm}^2$"],
                correct: "$462 \\text{ cm}^2$",
                explanation: "Luas permukaan setengah bola padat = Luas melengkung + Luas alas datar = 2 * pi * r² + pi * r² = 3 * pi * r² = 3 * 22/7 * 7 * 7 = 462 cm²."
            },
            // Slide 23: Soal 5
            {
                section: "Latihan Soal",
                title: "Misi 5: Mencari Jari-Jari Bola dari Volume",
                subtitle: "Menggunakan penarikan akar pangkat tiga (Hard)",
                icon: "🏆",
                render: () => `
                    <div class="text-center">
                        <p class="text-sm font-bold text-gray-600 mb-4">Sebuah bola besi memiliki <strong>Volume = $\\frac{4}{3}\\pi \\text{ cm}^3$</strong>. Berapakah jari-jari bola besi tersebut?</p>
                        <div class="grid grid-cols-2 gap-3 max-w-md mx-auto" id="options-s23"></div>
                    </div>
                `,
                isQuiz: true,
                options: ["$1 \\text{ cm}$", "$2 \\text{ cm}$", "$3 \\text{ cm}$", "$4 \\text{ cm}$"],
                correct: "$1 \\text{ cm}$",
                explanation: "Volume = 4/3 * pi * r³ -> 4/3 * pi = 4/3 * pi * r³ -> r³ = 1 -> r = 1 cm."
            },

            // Slide 24: Refleksi Kemandirian
            {
                section: "Refleksi",
                title: "Refleksi Detektif Volume",
                subtitle: "Evaluasi Kemandirian & Bernalar Kritis Kurikulum Merdeka",
                icon: "🌿",
                render: () => `
                    <div class="text-center max-w-xl mx-auto">
                        <p class="text-sm font-bold text-gray-600 mb-6">Pilih salah satu ikon yang mewakili pemahamanmu hari ini:</p>
                        <div class="grid grid-cols-3 gap-3">
                            <button onclick="handleEmotionSelect(this, 'paham')" class="bg-white hover:bg-emerald-50 border-2 border-emerald-200 p-4 rounded-2xl flex flex-col items-center transition active:scale-95">
                                <span class="text-4xl mb-2">😎</span>
                                <span class="text-xs font-bold text-gray-600">Sangat Paham</span>
                            </button>
                            <button onclick="handleEmotionSelect(this, 'latihan')" class="bg-white hover:bg-amber-50 border-2 border-amber-200 p-4 rounded-2xl flex flex-col items-center transition active:scale-95">
                                <span class="text-4xl mb-2">🤔</span>
                                <span class="text-xs font-bold text-gray-600">Butuh Latihan</span>
                            </button>
                            <button onclick="handleEmotionSelect(this, 'siap')" class="bg-white hover:bg-indigo-50 border-2 border-indigo-200 p-4 rounded-2xl flex flex-col items-center transition active:scale-95">
                                <span class="text-4xl mb-2">🔥</span>
                                <span class="text-xs font-bold text-gray-600">Siap Naik Level!</span>
                            </button>
                        </div>
                        <p id="emotion-feedback" class="text-xs font-bold text-[#D84315] mt-6 min-h-[16px]"></p>
                    </div>
                `
            },
            // Slide 25: Kesimpulan
            {
                section: "Kesimpulan",
                title: "Misi Detektif Volume Tuntas!",
                subtitle: "Selamat, kamu resmi dikukuhkan sebagai Detektif Volume Berbakat!",
                icon: "🏆",
                render: () => `
                    <div class="text-center">
                        <span class="text-7xl block mb-3 animate-bounce">👑🏆</span>
                        <h2 class="heading-font text-3xl font-extrabold text-[#D84315] mb-1">Misi Selesai Dengan Gemilang!</h2>
                        <p class="text-xs md:text-sm text-gray-600 max-w-md mx-auto mb-6">Kamu telah berhasil melintasi 25 slide tantangan membongkar pembuktian penuangan kerucut, tabung, dan bola dengan sangat luar biasa!</p>
                        <div onclick="resetAdventure()" class="inline-block bg-gradient-to-r from-[#FF8C00] to-[#E65100] text-white font-black px-8 py-3 rounded-2xl shadow-lg hover:scale-105 transition duration-300 cursor-pointer text-xs md:text-sm">
                            🔄 ULANGI MISI PETUALANGAN
                        </div>
                    </div>
                `
            }
        ];

        // --- 3. SYSTEM STATE ---
        let currentSlide = 0;
        let score = 0;

        // Canvas Sketchpad Context
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // Confetti Context
        const confettiCanvas = document.getElementById('confetti');
        const confettiCtx = confettiCanvas.getContext('2d');
        let confettiActive = false;
        let particles = [];

        // Dynamic Pouring Simulator 1 States
        let pourStep1 = 0; // Ranges 0, 1, 2, 3

        // Dynamic Pouring Simulator 2 States
        let pourStep2 = 0; // Ranges 0, 1, 2

        // --- 4. SHUFFLE UTILITY ---
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // --- 5. ENGINE INITIALIZATION ---
        window.onload = function() {
            loadSlide(0);
            initCanvas();
            setupTouchGestures();
        };

        // --- 6. RENDER CONTROL SYSTEM ---
        function loadSlide(index) {
            if (index < 0 || index >= slides.length) return;
            currentSlide = index;

            const slide = slides[currentSlide];
            
            const headerHtml = `
                <div class="mb-5 border-b-2 border-gray-100 pb-3">
                    <span class="text-xs font-black text-[#FF8C00] uppercase tracking-widest">${slide.section}</span>
                    <h1 class="heading-font text-2xl md:text-3xl font-extrabold text-slate-800 flex items-center gap-2 mt-1">
                        <span>${slide.icon}</span> ${slide.title}
                    </h1>
                    <p class="text-xs text-gray-400 font-semibold italic">${slide.subtitle}</p>
                </div>
            `;
            
            document.getElementById('slide-content').innerHTML = headerHtml + slide.render();

            // Progress Bar
            const percent = ((currentSlide + 1) / slides.length) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;

            // Footer metadata
            document.getElementById('slide-index').innerText = `Slide ${currentSlide + 1} / ${slides.length}`;
            document.getElementById('section-name').innerText = `Misi: ${slide.section}`;

            // Arrow States
            document.getElementById('prev-btn').style.opacity = currentSlide === 0 ? "0.3" : "1";
            document.getElementById('next-btn').style.opacity = currentSlide === slides.length - 1 ? "0.3" : "1";

            // If it is a quiz slide (Slide 19-23) -> Render shuffled options and attach verification logic
            if (slide.isQuiz) {
                const optContainerId = `options-s${currentSlide + 1}`;
                const container = document.getElementById(optContainerId);
                if (container) {
                    const shuffledOpts = shuffleArray(slide.options);
                    container.innerHTML = '';
                    shuffledOpts.forEach(opt => {
                        const btn = document.createElement('button');
                        btn.className = "w-full p-4 bg-indigo-50 hover:bg-indigo-100 border-2 border-indigo-200 rounded-xl text-xs md:text-sm font-bold text-indigo-900 transition btn-bounce flex justify-between items-center";
                        btn.innerHTML = `<span>${opt}</span><span class="opacity-50 text-[10px]">PILIH 👉</span>`;
                        btn.onclick = () => verifyAnswer(btn, opt, slide.correct, slide.explanation);
                        container.appendChild(btn);
                    });
                }
            }

            // Trigger Simulator Slide Actions
            if (currentSlide === 10) { 
                setTimeout(resetPourTabung, 100);
            }
            if (currentSlide === 14) { 
                setTimeout(resetPourBola, 100);
            }

            // Trigger MathJax re-render for perfect formatting
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function changeSlide(direction) {
            const nextIdx = currentSlide + direction;
            if (nextIdx >= 0 && nextIdx < slides.length) {
                playSound('click');
                loadSlide(nextIdx);
            }
        }

        // --- 7. ANSWER VERIFICATION & FEEDBACKS ---
        function verifyAnswer(element, selected, correct, explanation) {
            // Find parent and freeze option buttons
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.disabled = true;
                btn.classList.add('opacity-50');
            });

            const isCorrect = selected === correct;

            if (isCorrect) {
                element.classList.remove('opacity-50');
                element.classList.add('border-emerald-500', 'bg-emerald-100', 'text-emerald-800');
                element.innerHTML = `<span>${selected}</span> <span>🎉 BENAR!</span>`;
                
                // Re-typeset LaTeX formula correctly on correct selection
                if (window.MathJax) {
                    MathJax.typesetPromise([element]);
                }

                playSound('correct');
                showToast("✨ Keren! Pembahasan: " + explanation, "bg-[#10B981]");
                score += 15;
                document.getElementById('score-display').innerText = `${score} XP`;
                triggerConfetti();
            } else {
                element.classList.remove('opacity-50');
                element.classList.add('border-red-400', 'bg-red-100', 'text-red-800');
                element.innerHTML = `<span>${selected}</span> <span>❌ SALAH!</span>`;
                
                // Re-typeset LaTeX formula correctly on incorrect selection
                if (window.MathJax) {
                    MathJax.typesetPromise([element]);
                }

                playSound('incorrect');
                showToast("💡 Cakar kembali! Pembahasan: " + explanation, "bg-red-500");
            }
        }

        function checkSlideAnswer(element, isCorrect, feedback, points = 10) {
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.classList.remove('border-emerald-500', 'bg-emerald-50', 'border-red-400', 'bg-red-50');
            });

            if (isCorrect) {
                element.classList.add('border-emerald-500', 'bg-emerald-50');
                playSound('correct');
                showToast("✨ " + feedback, "bg-[#10B981]");
                score += points;
                document.getElementById('score-display').innerText = `${score} XP`;
                triggerConfetti();
            } else {
                element.classList.add('border-red-400', 'bg-red-50');
                playSound('incorrect');
                showToast("❌ " + feedback, "bg-red-500");
            }
        }

        function handleEmotionSelect(element, emotion) {
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.classList.remove('ring-4', 'ring-[#FF8C00]', 'scale-105');
            });
            element.classList.add('ring-4', 'ring-[#FF8C00]', 'scale-105');
            
            const feedbackText = document.getElementById('emotion-feedback');
            if (emotion === 'paham') {
                feedbackText.innerText = "Luar biasa! Asal-usul sepertiga volume kerucut dan empat sepertiga volume bola sudah kamu kuasai secara mantap! 😎";
                playSound('correct');
                triggerConfetti();
            } else if (emotion === 'latihan') {
                feedbackText.innerText = "Semangat! Gunakan tombol 'Papan Cakar' di pojok kanan atas untuk melatih coret-coret menghitung kembali! 🧠";
                playSound('click');
            } else {
                feedbackText.innerText = "Sangat Hebat! Jiwa detektif volume aljabarmu siap memecahkan persoalan tersulit sekalipun! 🚀";
                playSound('correct');
                triggerConfetti();
            }
        }

        function showToast(text, bgClass) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            toast.className = `fixed bottom-12 left-1/2 transform -translate-x-1/2 z-50 text-white font-black px-6 py-3 rounded-2xl shadow-xl flex items-center gap-2 animate-bounce ${bgClass}`;
            toastText.innerHTML = text;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 5000);
        }

        function resetAdventure() {
            score = 0;
            document.getElementById('score-display').innerText = `0 XP`;
            loadSlide(0);
        }

        // --- 8. POURING SIMULATOR 1 (KERUCUT KE TABUNG) ---
        function pourWaterTabung() {
            if (pourStep1 >= 3) return;
            
            playSound('correct');
            pourStep1++;

            const waterTabung = document.getElementById('water-tabung');
            const waterCone = document.getElementById('water-cone');
            const statusText = document.getElementById('pour-status-1');

            // Show full cone water then empty it (animation trick)
            waterCone.style.display = 'block';
            
            setTimeout(() => {
                waterCone.style.display = 'none';
                
                // Increase water level inside cylinder
                // Initial level: Y=85, Height=0. Full height: Y=25 (delta 60px). Each step adds 20px of height.
                const newY = 85 - (pourStep1 * 20);
                waterTabung.setAttribute('d', `M 15 85 L 15 ${newY} A 15 5 0 0 1 45 ${newY} L 45 85 Z`);

                if (pourStep1 === 1) {
                    statusText.innerText = "Tuangan Ke-1: Mengisi 1/3 kapasitas tabung.";
                } else if (pourStep1 === 2) {
                    statusText.innerText = "Tuangan Ke-2: Mengisi 2/3 kapasitas tabung.";
                } else if (pourStep1 === 3) {
                    statusText.innerText = "Tuangan Ke-3: Tabung PENUH! Terbukti Vol Kerucut = 1/3 Vol Tabung! 🎉";
                    triggerConfetti();
                }
            }, 600);
        }

        function resetPourTabung() {
            pourStep1 = 0;
            const waterTabung = document.getElementById('water-tabung');
            const waterCone = document.getElementById('water-cone');
            const statusText = document.getElementById('pour-status-1');

            if (waterTabung) waterTabung.setAttribute('d', "M 15 85 L 45 85 Z");
            if (waterCone) waterCone.style.display = 'none';
            if (statusText) statusText.innerText = "Kerucut kosong. Klik 'Tuangkan!' untuk mengisi.";
        }

        // --- 9. POURING SIMULATOR 2 (KERUCUT KE BELAHAN BOLA) ---
        function pourWaterBola() {
            if (pourStep2 >= 2) return;

            playSound('correct');
            pourStep2++;

            const waterBola = document.getElementById('water-bola');
            const waterCone2 = document.getElementById('water-cone-2');
            const statusText = document.getElementById('pour-status-2');

            // Show full cone water then empty it
            waterCone2.style.display = 'block';

            setTimeout(() => {
                waterCone2.style.display = 'none';

                // Hemisphere fill animation
                // Base: (15,50) to (75,50) with center (45,50). 
                // Full volume curve: A 30 30 0 0 0 75 50
                if (pourStep2 === 1) {
                    // Half filled hemisphere (smaller arc)
                    waterBola.setAttribute('d', 'M 25 50 A 20 20 0 0 0 65 50 Z');
                    statusText.innerText = "Tuangan Ke-1: Mengisi 1/2 kapasitas belahan bola.";
                } else if (pourStep2 === 2) {
                    // Fully filled hemisphere
                    waterBola.setAttribute('d', 'M 15 50 A 30 30 0 0 0 75 50 Z');
                    statusText.innerText = "Tuangan Ke-2: Belahan Bola PENUH! Terbukti Vol Belahan Bola = 2x Vol Kerucut! 🎉";
                    triggerConfetti();
                }
            }, 600);
        }

        function resetPourBola() {
            pourStep2 = 0;
            const waterBola = document.getElementById('water-bola');
            const waterCone2 = document.getElementById('water-cone-2');
            const statusText = document.getElementById('pour-status-2');

            if (waterBola) waterBola.setAttribute('d', "M 15 50 Z");
            if (waterCone2) waterCone2.style.display = 'none';
            if (statusText) statusText.innerText = "Belahan bola kosong. Klik 'Tuangkan!' untuk memulai.";
        }

        // --- 10. DOODLE CANVAS SYSTEM ---
        function toggleScratchpad() {
            const pad = document.getElementById('scratchpad');
            pad.classList.toggle('hidden');
            if (!pad.classList.contains('hidden')) {
                resizeCanvas();
            }
        }

        function initCanvas() {
            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                ctx.beginPath();
                const r = canvas.getBoundingClientRect();
                ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
            });
            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
                ctx.stroke();
            });
            canvas.addEventListener('mouseup', () => isDrawing = false);

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isDrawing = true;
                ctx.beginPath();
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                ctx.moveTo(t.clientX - r.left, t.clientY - r.top);
            });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isDrawing) return;
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(t.clientX - r.left, t.clientY - r.top);
                ctx.stroke();
            });
            canvas.addEventListener('touchend', () => isDrawing = false);
        }

        function resizeCanvas() {
            const parent = canvas.parentNode;
            canvas.width = parent.clientWidth;
            canvas.height = parent.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 3.5;
            ctx.strokeStyle = '#00838F'; 
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // --- 11. SWIPE GESTURES ---
        let startX = 0;
        function setupTouchGestures() {
            const wrapper = document.getElementById('slide-wrapper');
            wrapper.addEventListener('touchstart', (e) => {
                startX = e.changedTouches[0].screenX;
            }, false);

            wrapper.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].screenX;
                const threshold = 60;
                if (startX - endX > threshold) {
                    changeSlide(1); 
                } else if (endX - startX > threshold) {
                    changeSlide(-1); 
                }
            }, false);
        }

        // --- 12. CONFETTI CELEBRATION EFFECTS ---
        function triggerConfetti() {
            confettiActive = true;
            confettiCanvas.classList.remove('hidden');
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
            
            particles = [];
            for (let i = 0; i < 75; i++) {
                particles.push({
                    x: Math.random() * confettiCanvas.width,
                    y: Math.random() * confettiCanvas.height - confettiCanvas.height,
                    r: Math.random() * 5 + 4,
                    d: Math.random() * confettiCanvas.height,
                    color: `hsl(${Math.random() * 360}, 100%, 70%)`,
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            animateConfetti();
            setTimeout(() => {
                confettiActive = false;
                confettiCanvas.classList.add('hidden');
            }, 2500);
        }

        function animateConfetti() {
            if (!confettiActive) return;
            confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            
            particles.forEach((p, idx) => {
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle);
                p.tilt = Math.sin(p.tiltAngle - idx / 3) * 15;

                confettiCtx.beginPath();
                confettiCtx.lineWidth = p.r;
                confettiCtx.strokeStyle = p.color;
                confettiCtx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                confettiCtx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                confettiCtx.stroke();
            });

            requestAnimationFrame(animateConfetti);
        }
    </script>
</body>
